name: CI

# Gate every push/PR on the same checks the loop runs locally: lint, typecheck, tests, legal/prod
# readiness guards, and a real production build.
#
# [HUMAN] required before this is effective: (1) git init + push this repo to GitHub, (2) add repo
# Secrets NEXT_PUBLIC_SUPABASE_URL + NEXT_PUBLIC_SUPABASE_ANON_KEY (the build fail-fasts without them in
# production), (3) enable branch protection requiring this workflow to pass.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Legal placeholder check
        run: pnpm check:legal

      - name: Production readiness guard
        run: pnpm check:prod

      - name: Production build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # Edge-function (Deno) money-path tests — covers the shared subscription mapper / reconcile predicate
  # used by stripe-webhook + reconcile-subscriptions. The same logic is also vitest-covered in `verify`.
  edge-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Deno tests
        run: deno test supabase/functions/
